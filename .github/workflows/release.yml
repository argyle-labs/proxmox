name: Release

# Self-contained plugin release with pipeline-managed versioning. Builds the
# cdylib against orca `main` for EVERY supported host target IN PARALLEL and
# publishes a GitHub Release with one artifact + sha256 per target. The operator
# never edits Cargo.toml — the pipeline computes the next version from the repo's
# own git tags:
#   Actions → Release → Run workflow → channel (rc | stable) + bump.
#
# Version math (mirrors orca's compute_rc_version, one logic across all repos):
#   • base = highest `vX.Y.Z` stable tag (v0.0.0 if none), bumped by `bump`
#     (patch | minor | major).
#   • channel=rc     → `v<base>-rc.<n>`, n = next free rc index for that base.
#   • channel=stable → `v<base>` (full release).
#
# ## Universal (multi-target) artifacts
#
# A cdylib plugin is `dlopen`'d into the orca daemon, so its artifact is coupled
# to the daemon's libc (glibc vs musl) and CPU arch. Each target builds in its
# OWN matrix job (parallel — a cold cross-compile of the full dep tree is ~10min,
# so serial would be ~Nx that), cross-compiled with cargo-zigbuild (zig as the C
# toolchain), and uploads its asset. The release job gathers them and publishes
# one `{name}-v{version}-{triple}.so` + `.sha256` per target. orca's
# `plugin.install --name` picks the asset matching the installing daemon's triple.
#
# Targets match the orca release matrix (x86_64 gnu+musl; the fleet is all
# x86_64 and orca itself ships no linux-arm). musl is built with
# `-C target-feature=-crt-static` so the cdylib is a real shared object that the
# (dynamically-linked) musl daemon can load. Add arm/darwin rows when a host
# needs them.

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel: rc (prerelease) or stable"
        required: true
        type: choice
        options: [rc, stable]
        default: rc
      bump:
        description: "Version bump from latest stable tag"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      notes:
        description: "Extra release notes (optional)"
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"

jobs:
  # ── Compute the version/tag once, shared by every build job + the release. ──
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute next version from tags
        id: ver
        run: |
          set -euo pipefail
          git fetch --tags --quiet || true
          latest_stable=$(git tag -l 'v[0-9]*' \
            | { grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true; } \
            | sort -V | tail -1)
          latest_stable=${latest_stable:-v0.0.0}
          IFS='.' read -r major minor patch <<< "${latest_stable#v}"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
            *) echo "::error::bump must be patch|minor|major"; exit 1 ;;
          esac
          base="${major}.${minor}.${patch}"
          if [ "${{ inputs.channel }}" = "stable" ]; then
            version="$base"; tag="v$base"; prerelease=false
          else
            latest_rc=$(git tag -l "v${base}-rc.*" | sort -V | tail -1)
            if [ -z "$latest_rc" ]; then n=1; else n=${latest_rc##*rc.}; n=$((n+1)); fi
            version="${base}-rc.${n}"; tag="v${version}"; prerelease=true
          fi
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "→ ${{ inputs.channel }} (${{ inputs.bump }}) from ${latest_stable}: $tag"

  # ── One parallel job per host target; each uploads its cdylib artifact. ──
  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            rustflags: ""
          # musl: disable crt-static so the cdylib is a real .so the dynamic
          # musl daemon can dlopen (a static musl build emits no shared object).
          - target: x86_64-unknown-linux-musl
            rustflags: "-C target-feature=-crt-static"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Drop local-dev cargo patch
        run: rm -f .cargo/config.toml

      - name: Authenticate private orca git dependency
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.ORCA_FETCH_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

      - name: Write computed version into Cargo.toml
        run: |
          set -euo pipefail
          sed -i 's/^version = ".*"/version = "${{ needs.version.outputs.version }}"/' Cargo.toml
          grep -m1 '^version = ' Cargo.toml

      - name: Install cross toolchain (zig + cargo-zigbuild)
        run: |
          set -euo pipefail
          python3 -m pip install --user cargo-zigbuild ziglang
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          rustup target add "${{ matrix.target }}"

      - name: Build cdylib
        id: meta
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          set -euo pipefail
          name=$(grep -m1 '^name = ' Cargo.toml | sed -E 's/name = "(.*)"/\1/')
          libname=$(echo "$name" | tr - _)
          cargo zigbuild --release --target "${{ matrix.target }}"
          so="target/${{ matrix.target }}/release/lib${libname}.so"
          if [ ! -f "$so" ]; then
            echo "::error::cdylib not found at $so"; ls -la "target/${{ matrix.target }}/release" || true; exit 1
          fi
          asset="${name}-${{ needs.version.outputs.tag }}-${{ matrix.target }}.so"
          cp "$so" "$asset"
          sha256sum "$asset" > "${asset}.sha256"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: cdylib-${{ matrix.target }}
          path: |
            ${{ steps.meta.outputs.asset }}
            ${{ steps.meta.outputs.asset }}.sha256
          retention-days: 3

  # ── Gather every target's artifact and publish one release. ──
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all target artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cdylib-*
          merge-multiple: true

      - name: Create GitHub Release (pipeline-tagged)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          flags=""
          [ "${{ needs.version.outputs.prerelease }}" = "true" ] && flags="--prerelease"
          notes="${{ inputs.notes }}"
          [ -z "$notes" ] && notes="Automated ${{ inputs.channel }} release of \`${{ github.repository }}\`, built against orca \`main\`. One cdylib per host target (x86_64 glibc/musl)."
          ls -la dist
          gh release create "${{ needs.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --notes "$notes" \
            $flags \
            dist/*
