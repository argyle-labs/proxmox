name: Release

# Self-contained plugin release with pipeline-managed versioning. Builds the
# cdylib against orca `main` for EVERY supported host target and publishes a
# GitHub Release with one artifact + sha256 per target. The operator never edits
# Cargo.toml â€” the pipeline computes the next version from the repo's own git
# tags:
#   Actions â†’ Release â†’ Run workflow â†’ channel (rc | stable) + bump.
#
# Version math (mirrors orca's compute_rc_version, one logic across all repos):
#   â€˘ base = highest `vX.Y.Z` stable tag (v0.0.0 if none), bumped by `bump`
#     (patch | minor | major).
#   â€˘ channel=rc     â†’ `v<base>-rc.<n>`, n = next free rc index for that base
#     (prerelease).
#   â€˘ channel=stable â†’ `v<base>` (full release).
# The computed version is written into Cargo.toml at build time so the cdylib
# embeds the right CARGO_PKG_VERSION; the git tag is the source of truth, so the
# committed Cargo.toml version is never hand-managed.
#
# ## Universal (multi-target) artifacts
#
# A cdylib plugin is `dlopen`'d into the orca daemon, so its artifact is coupled
# to the daemon's libc (glibc vs musl) and CPU arch. We therefore cross-compile
# one asset per Rust target triple with cargo-zigbuild (zig as the C toolchain â€”
# the centralized cross-compile recipe reused across every plugin repo), naming
# each `{name}-v{version}-{triple}.so` + `.sha256`. orca's `plugin.install
# --name` picks the asset matching the installing daemon's own target triple.
# (Apple targets need native clang, not zigbuild, so macOS is a separate
# follow-up â€” the Linux fleet is the target here.)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel: rc (prerelease) or stable"
        required: true
        type: choice
        options: [rc, stable]
        default: rc
      bump:
        description: "Version bump from latest stable tag"
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch
      notes:
        description: "Extra release notes (optional)"
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  # Host targets an orca daemon can run on. One cdylib asset is published per
  # entry. Keep in sync across all plugin repos.
  TARGETS: >-
    x86_64-unknown-linux-gnu
    aarch64-unknown-linux-gnu
    x86_64-unknown-linux-musl
    aarch64-unknown-linux-musl

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Drop local-dev cargo patch
        run: rm -f .cargo/config.toml

      - name: Authenticate private orca git dependency
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.ORCA_FETCH_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"

      - name: Compute next version from tags
        id: ver
        run: |
          set -euo pipefail
          git fetch --tags --quiet || true
          latest_stable=$(git tag -l 'v[0-9]*' \
            | { grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true; } \
            | sort -V | tail -1)
          latest_stable=${latest_stable:-v0.0.0}
          IFS='.' read -r major minor patch <<< "${latest_stable#v}"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
            *) echo "::error::bump must be patch|minor|major"; exit 1 ;;
          esac
          base="${major}.${minor}.${patch}"
          if [ "${{ inputs.channel }}" = "stable" ]; then
            version="$base"; tag="v$base"; prerelease=false
          else
            latest_rc=$(git tag -l "v${base}-rc.*" | sort -V | tail -1)
            if [ -z "$latest_rc" ]; then n=1; else n=${latest_rc##*rc.}; n=$((n+1)); fi
            version="${base}-rc.${n}"; tag="v${version}"; prerelease=true
          fi
          {
            echo "version=$version"
            echo "tag=$tag"
            echo "prerelease=$prerelease"
            echo "previous_stable=$latest_stable"
          } >> "$GITHUB_OUTPUT"
          echo "â†’ ${{ inputs.channel }} (${{ inputs.bump }}) from ${latest_stable}: $tag"

      - name: Write computed version into Cargo.toml
        run: |
          set -euo pipefail
          sed -i 's/^version = ".*"/version = "${{ steps.ver.outputs.version }}"/' Cargo.toml
          grep -m1 '^version = ' Cargo.toml

      - name: Install cross toolchain (zig + cargo-zigbuild)
        run: |
          set -euo pipefail
          # Prebuilt wheels â€” no source compile of cargo-zigbuild.
          python3 -m pip install --user cargo-zigbuild ziglang
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          for t in $TARGETS; do rustup target add "$t"; done

      - name: Build cdylib for every target
        id: meta
        run: |
          set -euo pipefail
          name=$(grep -m1 '^name = ' Cargo.toml | sed -E 's/name = "(.*)"/\1/')
          libname=$(echo "$name" | tr - _)
          tag="${{ steps.ver.outputs.tag }}"
          assets=()
          for t in $TARGETS; do
            echo "â”€â”€ building $t â”€â”€"
            cargo zigbuild --release --target "$t"
            so="target/${t}/release/lib${libname}.so"
            if [ ! -f "$so" ]; then
              echo "::error::cdylib not found at $so for $t"; ls -la "target/${t}/release" || true; exit 1
            fi
            asset="${name}-${tag}-${t}.so"
            cp "$so" "$asset"
            sha256sum "$asset" > "${asset}.sha256"
            assets+=("$asset" "${asset}.sha256")
          done
          # Newline-separated list for the release step.
          printf '%s\n' "${assets[@]}" > release-assets.txt
          echo "count=${#assets[@]}" >> "$GITHUB_OUTPUT"
          echo "Staged ${#assets[@]} files:"; cat release-assets.txt

      - name: Create GitHub Release (pipeline-tagged)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          flags=""
          [ "${{ steps.ver.outputs.prerelease }}" = "true" ] && flags="--prerelease"
          notes="${{ inputs.notes }}"
          [ -z "$notes" ] && notes="Automated ${{ inputs.channel }} release of \`${{ github.repository }}\`, built against orca \`main\`. One cdylib per host target (glibc/musl Ă— x86_64/aarch64)."
          mapfile -t assets < release-assets.txt
          gh release create "${{ steps.ver.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes "$notes" \
            $flags \
            "${assets[@]}"
